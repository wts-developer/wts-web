name: Deploy GitHub Pages

# Manual-only while the repo is private: GitHub Pages can't publish from a
# private repo on the free plan, so a push trigger would just fail on every
# push. If the repo goes public, enable Settings -> Pages -> Source: GitHub
# Actions and restore the push trigger:
#   push:
#     branches: [main]
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build tuition estimator
        run: python3 projects/tuition-estimator/build.py

      - name: Assemble site
        run: |
          mkdir -p _site/tuition-estimator
          cp site/index.html _site/
          cp -R projects/tuition-estimator/dist/. _site/tuition-estimator/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
