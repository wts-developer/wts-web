name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build tuition estimator
        run: python3 projects/tuition-estimator/build.py

      - name: Build tuition chat widget
        run: python3 projects/tuition-chat-widget/build.py

      - name: Assemble site
        run: |
          mkdir -p _site/tuition-estimator _site/tuition-chat-widget
          cp site/index.html _site/
          cp -R projects/tuition-estimator/dist/. _site/tuition-estimator/
          cp -R projects/tuition-chat-widget/dist/. _site/tuition-chat-widget/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
